name: Build

on:
  workflow_dispatch:
  push:
    branches: ['main']
  pull_request:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    timeout-minutes: 30
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5
        with:
          run_install: false
          cache: true

      - name: Install Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}

      - name: Setup safe-chain
        run: curl -fsSL https://github.com/AikidoSec/safe-chain/releases/latest/download/install-safe-chain.sh | sh -s -- --ci

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Restore/Save Rust
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1ff72ee08e3cb84d84adba594e0a297990fc1ed3 # stable
        with:
          components: clippy

      - name: Install wasm-pack
        uses: taiki-e/install-action@cca35edeb1d01366c2843b68fc3ca441446d73d3 # v2.77.1
        with:
          tool: wasm-pack

      - uses: giraffate/clippy-action@94e9bd8deab2618756ec5380f12eb35bcb0a88ca # v1
        if: ${{ github.event_name == 'pull_request' }}
        with:
          reporter: 'github-pr-review'
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Linter/Formatter
        if: ${{ github.event_name == 'pull_request' }}
        run: pnpm run lint

      - name: Run build
        run: pnpm run build

      - name: Run check
        if: ${{ github.event_name == 'pull_request' }}
        run: pnpm run check

      - name: Run Tests
        run: pnpm run test
